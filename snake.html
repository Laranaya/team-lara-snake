<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game – Copilot Challenge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }
    #score-board {
      font-size: 1.4rem;
      margin-bottom: 12px;
      letter-spacing: 2px;
      display: flex;
      gap: 40px;
    }
    #score-board span { color: #00d4aa; font-weight: bold; }
    #high-score { color: #ffd700; }
    canvas {
      border: 3px solid #00d4aa;
      background: #0f3460;
      display: block;
      box-shadow: 0 0 20px rgba(0, 212, 170, 0.5);
    }
    #controls {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #00d4aa 0%, #00aa88 100%);
      color: #1a1a2e;
      box-shadow: 0 0 10px rgba(0, 212, 170, 0.6);
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0, 212, 170, 0.9);
    }
    button:active {
      transform: scale(0.98);
    }
    #wrap-mode-btn {
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      box-shadow: 0 0 10px rgba(46, 204, 113, 0.6);
    }
    #wrap-mode-btn:hover {
      box-shadow: 0 0 25px rgba(46, 204, 113, 0.9);
    }
    #wrap-mode-btn.active {
      box-shadow: 0 0 30px rgba(46, 204, 113, 1), inset 0 0 10px rgba(46, 204, 113, 0.5);
    }
    #game-over-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }
    #game-over-screen.show {
      display: flex;
    }
    #game-over-content {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      border: 3px solid #00d4aa;
      box-shadow: 0 0 40px rgba(0, 212, 170, 0.6);
      animation: slideIn 0.4s ease;
    }
    @keyframes slideIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    #game-over-content h1 {
      font-size: 3rem;
      color: #ff6b6b;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
    }
    #game-over-content p {
      font-size: 1.3rem;
      margin: 10px 0;
      color: #eee;
    }
    #game-over-content .score-final {
      font-size: 1.8rem;
      color: #00d4aa;
      font-weight: bold;
      margin: 15px 0;
    }
    #game-over-content .high-score-display {
      font-size: 1.3rem;
      color: #ffd700;
      margin: 10px 0;
    }
    #restart-btn {
      margin-top: 30px;
      padding: 15px 40px;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #00d4aa 0%, #00aa88 100%);
      box-shadow: 0 0 20px rgba(0, 212, 170, 0.8);
    }
    #restart-btn:hover {
      box-shadow: 0 0 35px rgba(0, 212, 170, 1);
    }
  </style>
</head>
<body>

  <div id="score-board">SCORE: <span id="score">0</span></div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    // ─────────────────────────────────────────────────────────────────
    // TODO – PHASE 3, STEP 1
    // Using Copilot Agent, define the game constants and variables.
    // Use the starter prompt in prompts.md → Phase 3, Step 1.
    //
    // You will need: GRID_SIZE, TILE_COUNT, snake array, food object,
    // direction variables (dx/dy), a score counter, and a gameLoop ref.
    // ─────────────────────────────────────────────────────────────────

    const GRID_SIZE = 20;
    const TILE_COUNT = 20;

    let snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];

    let food = {
      x: Math.floor(Math.random() * TILE_COUNT),
      y: Math.floor(Math.random() * TILE_COUNT)
    };

    let dx = 1;
    let dy = 0;
    let score = 0;
    let gameLoop = null;


    // ─────────────────────────────────────────────────────────────────
    // TODO – PHASE 3, STEP 2
    // Using Copilot Agent, add keyboard event listeners.
    // Use the starter prompt in prompts.md → Phase 3, Step 2.
    //
    // Handle ArrowUp / ArrowDown / ArrowLeft / ArrowRight.
    // Prevent the snake from reversing directly into itself.
    // ─────────────────────────────────────────────────────────────────

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp' && dy !== 1) {
        dx = 0;
        dy = -1;
      } else if (e.key === 'ArrowDown' && dy !== -1) {
        dx = 0;
        dy = 1;
      } else if (e.key === 'ArrowLeft' && dx !== 1) {
        dx = -1;
        dy = 0;
      } else if (e.key === 'ArrowRight' && dx !== -1) {
        dx = 1;
        dy = 0;
      }
    });


    // ─────────────────────────────────────────────────────────────────
    // TODO – PHASE 3, STEP 3
    // Using Copilot Agent, implement the main game loop function.
    // Use the starter prompt in prompts.md → Phase 3, Step 3.
    //
    // It should: move the snake, check wall/self collisions,
    // check if food is eaten, draw everything on the canvas.
    // ─────────────────────────────────────────────────────────────────

    function gameStep() {
      // 1. Calculate new head position
      const newHead = { x: snake[0].x + dx, y: snake[0].y + dy };

      // 2. Check wall collision
      if (newHead.x < 0 || newHead.x >= TILE_COUNT || newHead.y < 0 || newHead.y >= TILE_COUNT) {
        gameOver();
        return;
      }

      // 3. Check self-collision
      if (snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
        gameOver();
        return;
      }

      // 4. Add new head to front of snake
      snake.unshift(newHead);

      // 5. Check if food eaten
      if (newHead.x === food.x && newHead.y === food.y) {
        score++;
        scoreEl.textContent = score;
        // Place food at new random grid position
        food = {
          x: Math.floor(Math.random() * TILE_COUNT),
          y: Math.floor(Math.random() * TILE_COUNT)
        };
      } else {
        // 6. Remove tail if food NOT eaten (normal movement)
        snake.pop();
      }

      // 7. Clear entire canvas
      ctx.fillStyle = '#0f3460';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 8. Draw snake as a continuous modern body
      // Draw body segments with smooth connections
      for (let i = snake.length - 1; i >= 0; i--) {
        const segment = snake[i];
        const x = segment.x * GRID_SIZE;
        const y = segment.y * GRID_SIZE;
        const centerX = x + GRID_SIZE / 2;
        const centerY = y + GRID_SIZE / 2;

        if (i === 0) {
          // Draw head with modern style
          ctx.fillStyle = '#27ae60'; // Dark green
          ctx.beginPath();
          ctx.arc(centerX, centerY, GRID_SIZE / 2 - 1, 0, Math.PI * 2);
          ctx.fill();

          // Head highlight
          ctx.fillStyle = '#2ecc71';
          ctx.beginPath();
          ctx.ellipse(centerX, centerY - 3, GRID_SIZE / 3.5, GRID_SIZE / 4.5, 0, 0, Math.PI * 2);
          ctx.fill();

          // Large expressive anime eyes
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.arc(centerX - 5, centerY - 2, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(centerX + 5, centerY - 2, 3, 0, Math.PI * 2);
          ctx.fill();

          // Eye shine (big sparkles)
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(centerX - 5, centerY - 3, 1.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(centerX + 5, centerY - 3, 1.5, 0, Math.PI * 2);
          ctx.fill();

          // Rosy cheeks
          ctx.fillStyle = 'rgba(255, 105, 180, 0.6)';
          ctx.beginPath();
          ctx.arc(centerX - 8, centerY + 1, 2.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(centerX + 8, centerY + 1, 2.5, 0, Math.PI * 2);
          ctx.fill();

          // Draw forked tongue sticking out
          ctx.strokeStyle = '#ff69b4';
          ctx.lineWidth = 1.5;
          ctx.lineCap = 'round';
          
          // Left fork of tongue
          ctx.beginPath();
          ctx.moveTo(centerX - 1.5, centerY + 7);
          ctx.lineTo(centerX - 3, centerY + 11);
          ctx.stroke();
          
          // Right fork of tongue
          ctx.beginPath();
          ctx.moveTo(centerX + 1.5, centerY + 7);
          ctx.lineTo(centerX + 3, centerY + 11);
          ctx.stroke();

          // Tongue base (small circle)
          ctx.fillStyle = '#ff69b4';
          ctx.beginPath();
          ctx.arc(centerX, centerY + 6, 1.5, 0, Math.PI * 2);
          ctx.fill();

        } else {
          // Draw body segments as connected ovals (smooth, flowing)
          let width = GRID_SIZE - 3;
          let height = GRID_SIZE - 2;

          // Gradient body color (darker green with belly)
          ctx.fillStyle = '#27ae60';
          ctx.beginPath();
          ctx.ellipse(centerX, centerY, width / 2, height / 2, 0, 0, Math.PI * 2);
          ctx.fill();

          // Belly stripe (lighter)
          ctx.fillStyle = '#f0e68c';
          ctx.beginPath();
          ctx.ellipse(centerX, centerY + 2, width / 2.5, height / 3.5, 0, 0, Math.PI * 2);
          ctx.fill();

          // Add pattern spots (brown)
          if (Math.random() > 0.6) {
            ctx.fillStyle = '#8b6f47';
            ctx.beginPath();
            ctx.arc(centerX - 3, centerY - 2, 1.3, 0, Math.PI * 2);
            ctx.fill();
          }

          // Scale texture (darker outline segments)
          ctx.strokeStyle = '#1a5f2e';
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.ellipse(centerX, centerY, width / 2, height / 2, 0, 0, Math.PI * 2);
          ctx.stroke();

          // Add scale line in middle (for visual depth)
          ctx.strokeStyle = '#1a5f2e';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(centerX - width / 2.5, centerY);
          ctx.lineTo(centerX + width / 2.5, centerY);
          ctx.stroke();
        }
      }

      // 9. Draw food as filled circle centred on its tile
      ctx.fillStyle = '#ff6b6b'; // Red
      ctx.beginPath();
      ctx.arc(
        food.x * GRID_SIZE + GRID_SIZE / 2,
        food.y * GRID_SIZE + GRID_SIZE / 2,
        GRID_SIZE / 3,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function gameOver() {
      clearInterval(gameLoop);
    }


    // ─────────────────────────────────────────────────────────────────
    // TODO – PHASE 3, STEP 4
    // Using Copilot Agent, start the game loop with setInterval.
    // Use the starter prompt in prompts.md → Phase 3, Step 4.
    //
    // Start with an interval of ~150ms. Update scoreEl.textContent
    // whenever the snake eats food.
    // ─────────────────────────────────────────────────────────────────

    gameLoop = setInterval(gameStep, 150);


    // ─────────────────────────────────────────────────────────────────
    // TODO – PHASE 4
    // Using Copilot Agent, add refinements and extra features.
    // See prompts.md → Phase 4 for ideas and starter prompts.
    //
    // Ideas: game over screen, restart button, speed ramp-up,
    // high score (localStorage), walls-off wrap mode, visual effects...
    // ─────────────────────────────────────────────────────────────────

  </script>
</body>
</html>
